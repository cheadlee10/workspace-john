<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ligaya Landscaping — Downtown Seattle | Professional Garden Design</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0D4F4B;
  --secondary: #E8B4B8;
  --accent: #F9D89C;
  --dark: #1A1A2E;
  --light: #FAF9F6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--light); color: var(--dark); }
.hero {
  min-height: 100vh;
  background: linear-gradient(135deg, #0D4F4B 0%, #1E6F6B 50%, #2A9D8F 100%);
  display: flex; align-items: center; justify-content: center;
  padding: 120px 24px; position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(249,216,156,0.15) 0%, transparent 50%);
  animation: pulse 8s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.1); opacity: 0.8; }
}
.hero-content { max-width: 700px; text-align: center; color: white; position: relative; z-index: 1; }
h1 {
  font-family: 'Cormorant Garamond', serif; font-size: clamp(44px, 7vw, 72px);
  font-weight: 700; line-height: 1.1; margin-bottom: 24px;
}
h1 span { color: var(--accent); font-style: italic; }
.subtitle { font-size: 18px; opacity: 0.85; margin-bottom: 36px; }
.cta-btn {
  display: inline-block; background: var(--accent); color: var(--dark);
  padding: 18px 42px; border-radius: 50px; font-weight: 700; font-size: 16px;
  text-decoration: none; box-shadow: 0 8px 32px rgba(249,216,156,0.4);
  transition: transform 0.3s, box-shadow 0.3s;
}
.cta-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(249,216,156,0.5); }
.phone { font-size: 36px; color: var(--accent); font-weight: 700; margin-top: 32px; }
@media (max-width: 600px) {
  h1 { font-size: 36px; }
  .phone { font-size: 28px; }
}
</style>
</head>
<body>
<section class="hero">
  <div class="hero-content">
    <h1>Gardens with<br><span>Soul.</span></h1>
    <p class="subtitle">Ligaya Landscaping brings joy to outdoor spaces across Downtown Seattle. Custom designs, meticulous care, sustainable practices — since 2019.</p>
    <a href="tel:2063517402" class="cta-btn">Get Your Free Quote</a>
    <div class="phone">(206) 351-7402</div>
  </div>
</section>
</body>
</html>
